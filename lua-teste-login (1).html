<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua — Teste Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; background: #1a0f0a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.box { background: rgba(255,255,255,0.05); border: 1px solid rgba(201,137,122,0.3); border-radius: 20px; padding: 32px; width: 100%; max-width: 380px; }
h2 { color: #E8C5BC; margin-bottom: 24px; text-align: center; font-weight: 300; letter-spacing: 4px; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab { flex: 1; padding: 10px; border: 1px solid rgba(201,137,122,0.3); border-radius: 10px; background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 14px; }
.tab.active { background: #C9897A; color: white; border-color: #C9897A; }
.form { display: flex; flex-direction: column; gap: 12px; }
label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); display: block; margin-bottom: 4px; }
input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 11px 14px; font-size: 14px; color: white; outline: none; }
input:focus { border-color: #C9897A; }
.tipo { display: flex; gap: 8px; }
.tipo-btn { flex: 1; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 13px; }
.tipo-btn.sel { border-color: #C9897A; color: #E8C5BC; background: rgba(201,137,122,0.1); }
.btn { width: 100%; padding: 13px; background: #C9897A; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn:disabled { opacity: 0.5; }
.erro { background: rgba(224,90,90,0.15); border: 1px solid rgba(224,90,90,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ffaaaa; display: none; }
.ok { background: rgba(90,200,90,0.15); border: 1px solid rgba(90,200,90,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #aaffaa; display: none; }
#status { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.3); text-align: center; }
#app-area { display: none; text-align: center; padding: 20px; }
#app-area h3 { color: #E8C5BC; font-size: 22px; margin-bottom: 10px; }
.sair { background: transparent; border: 1px solid rgba(201,137,122,0.3); color: #C9897A; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 13px; margin-top: 16px; }
</style>
</head>
<body>

<div id="login-box" class="box">
  <h2>🌙 LUA</h2>

  <div class="tabs">
    <button class="tab active" id="tab-entrar" onclick="trocarAba('entrar')">Entrar</button>
    <button class="tab" id="tab-cadastrar" onclick="trocarAba('cadastrar')">Criar conta</button>
  </div>

  <!-- ENTRAR -->
  <div id="form-entrar" class="form">
    <div>
      <label>E-mail</label>
      <input type="email" id="email-login" placeholder="seu@email.com">
    </div>
    <div>
      <label>Senha</label>
      <input type="password" id="senha-login" placeholder="••••••••" onkeydown="if(event.key==='Enter') entrar()">
    </div>
    <div class="erro" id="erro-login"></div>
    <button class="btn" id="btn-entrar" onclick="entrar()">Entrar</button>
  </div>

  <!-- CADASTRAR -->
  <div id="form-cadastrar" class="form" style="display:none;">
    <div>
      <label>Nome</label>
      <input type="text" id="nome-cad" placeholder="Seu nome completo">
    </div>
    <div>
      <label>E-mail</label>
      <input type="email" id="email-cad" placeholder="seu@email.com">
    </div>
    <div>
      <label>Senha</label>
      <input type="password" id="senha-cad" placeholder="Mínimo 6 caracteres">
    </div>
    <div>
      <label>Você é...</label>
      <div class="tipo">
        <button class="tipo-btn sel" id="tipo-g" onclick="selecionarTipo('gestante')">🤰 Gestante</button>
        <button class="tipo-btn" id="tipo-d" onclick="selecionarTipo('doula')">🌙 Doula</button>
      </div>
    </div>
    <div class="erro" id="erro-cad"></div>
    <div class="ok" id="ok-cad"></div>
    <button class="btn" id="btn-cad" onclick="cadastrar()">Criar conta</button>
  </div>

  <div id="status">Carregando...</div>
</div>

<div id="app-area">
  <h3 id="bem-vindo"></h3>
  <p id="tipo-usuario" style="color:rgba(255,255,255,0.5);font-size:14px;margin-top:6px;"></p>
  <br>
  <p style="color:rgba(255,255,255,0.4);font-size:13px;">✅ Login funcionando! Este é só o teste.<br>O app completo está no outro arquivo.</p>
  <br>
  <button class="sair" onclick="sair()">Sair</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = 'https://mmjrcusivcjiqjelyjyu.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tanJjdXNpdmNqaXFqZWx5anl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDQxOTgsImV4cCI6MjA5MDU4MDE5OH0.13GBrRbUPqz5x3fruc8JyPbDVa3rg5aSK5S6u89hrh4';

let db = null;
let tipoSel = 'gestante';

window.addEventListener('load', function() {
  try {
    db = window.supabase.createClient(SUPA_URL, KEY);
    document.getElementById('status').textContent = '✅ Conectado ao servidor';
    verificarSessao();
  } catch(e) {
    document.getElementById('status').textContent = '❌ Erro: ' + e.message;
  }
});

function trocarAba(aba) {
  document.getElementById('tab-entrar').classList.toggle('active', aba === 'entrar');
  document.getElementById('tab-cadastrar').classList.toggle('active', aba === 'cadastrar');
  document.getElementById('form-entrar').style.display = aba === 'entrar' ? 'flex' : 'none';
  document.getElementById('form-cadastrar').style.display = aba === 'cadastrar' ? 'flex' : 'none';
  document.getElementById('erro-login').style.display = 'none';
  document.getElementById('erro-cad').style.display = 'none';
}

function selecionarTipo(tipo) {
  tipoSel = tipo;
  document.getElementById('tipo-g').classList.toggle('sel', tipo === 'gestante');
  document.getElementById('tipo-d').classList.toggle('sel', tipo === 'doula');
}

async function entrar() {
  if (!db) return mostrarErro('erro-login', 'Servidor não conectado ainda. Aguarde.');
  const email = document.getElementById('email-login').value.trim();
  const senha = document.getElementById('senha-login').value;
  if (!email || !senha) return mostrarErro('erro-login', 'Preencha e-mail e senha.');
  const btn = document.getElementById('btn-entrar');
  btn.textContent = 'Entrando...'; btn.disabled = true;
  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password: senha });
    btn.textContent = 'Entrar'; btn.disabled = false;
    if (error) {
      if (error.message.includes('Email not confirmed')) return mostrarErro('erro-login', '📬 Confirme seu e-mail antes de entrar.');
      if (error.message.includes('Invalid login') || error.message.includes('invalid_credentials')) return mostrarErro('erro-login', 'E-mail ou senha incorretos.');
      return mostrarErro('erro-login', 'Erro: ' + error.message);
    }
    mostrarApp(data.user);
  } catch(e) {
    btn.textContent = 'Entrar'; btn.disabled = false;
    mostrarErro('erro-login', 'Erro de conexão: ' + e.message);
  }
}

async function cadastrar() {
  if (!db) return mostrarErro('erro-cad', 'Servidor não conectado ainda. Aguarde.');
  const nome = document.getElementById('nome-cad').value.trim();
  const email = document.getElementById('email-cad').value.trim();
  const senha = document.getElementById('senha-cad').value;
  if (!nome) return mostrarErro('erro-cad', 'Informe seu nome.');
  if (!email) return mostrarErro('erro-cad', 'Informe seu e-mail.');
  if (!senha || senha.length < 6) return mostrarErro('erro-cad', 'Senha precisa ter pelo menos 6 caracteres.');
  const btn = document.getElementById('btn-cad');
  btn.textContent = 'Criando...'; btn.disabled = true;
  try {
    const { data, error } = await db.auth.signUp({
      email, password: senha,
      options: { data: { nome, tipo: tipoSel }, emailRedirectTo: 'https://appluagestacao.netlify.app' }
    });
    btn.textContent = 'Criar conta'; btn.disabled = false;
    if (error) {
      if (error.message.includes('already registered')) return mostrarErro('erro-cad', 'E-mail já cadastrado. Tente entrar.');
      return mostrarErro('erro-cad', 'Erro: ' + error.message);
    }
    // Salvar na tabela usuarios
    if (data.user) {
      await db.from('usuarios').insert({ id: data.user.id, nome, email, tipo: tipoSel });
    }
    document.getElementById('erro-cad').style.display = 'none';
    const ok = document.getElementById('ok-cad');
    ok.style.display = 'block';
    ok.textContent = '📬 Conta criada! Verifique seu e-mail ' + email + ' para confirmar.';
  } catch(e) {
    btn.textContent = 'Criar conta'; btn.disabled = false;
    mostrarErro('erro-cad', 'Erro de conexão: ' + e.message);
  }
}

async function verificarSessao() {
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) mostrarApp(session.user);
  } catch(e) {}
}

function mostrarApp(user) {
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('app-area').style.display = 'block';
  const nome = user.user_metadata?.nome || user.email;
  const tipo = user.user_metadata?.tipo || 'usuário';
  document.getElementById('bem-vindo').textContent = 'Olá, ' + nome + '! 👋';
  document.getElementById('tipo-usuario').textContent = tipo === 'doula' ? '🌙 Doula' : '🤰 Gestante';
}

async function sair() {
  if (db) await db.auth.signOut();
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('app-area').style.display = 'none';
}

function mostrarErro(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
