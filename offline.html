<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lua — Sem conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #2D1F1A;
      color: #E8D5C4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .moon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 12px; color: #C9897A; }
    p { font-size: 15px; color: rgba(232,213,196,0.7); line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 32px;
      padding: 14px 32px;
      background: #C9897A;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="moon">🌙</div>
  <h1>Você está offline</h1>
  <p>Verifique sua conexão com a internet e tente novamente.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</body>
</html>
